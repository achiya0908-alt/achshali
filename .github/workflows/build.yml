name: Build Achshali APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Brain project structure
        run: |
          mkdir -p AchshaliBrain/app/src/main/java/com/achshali/brain
          mkdir -p AchshaliBrain/app/src/main/res/layout
             - name: Extract ZIP
                run: |
                    unzip achshali-complete.zip
          cp achshali/app1-brain/MainActivity.kt AchshaliBrain/app/src/main/java/com/achshali/brain/
          cp achshali/app1-brain/WakeWordService.kt AchshaliBrain/app/src/main/java/com/achshali/brain/
          cp achshali/app1-brain/BootReceiver.kt AchshaliBrain/app/src/main/java/com/achshali/brain/
          cp achshali/app1-brain/AndroidManifest.xml AchshaliBrain/app/src/main/
          cp achshali/app1-brain/activity_main.xml AchshaliBrain/app/src/main/res/layout/
          cp achshali/app1-brain/build.gradle AchshaliBrain/app/build.gradle

      - name: Create Brain Gradle files
        run: |
          cat > AchshaliBrain/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0'
              }
          }
          EOF
          cat > AchshaliBrain/settings.gradle << 'EOF'
          include ':app'
          EOF
          cat > AchshaliBrain/gradle.properties << 'EOF'
          android.useAndroidX=true
          EOF

      - name: Build Brain APK
        run: |
          cd AchshaliBrain
          gradle assembleDebug --no-daemon

      - name: Create Controller project structure
        run: |
          mkdir -p AchshaliController/app/src/main/java/com/achshali/controller
          mkdir -p AchshaliController/app/src/main/res/layout
          cp achshali/app2-controller/MainActivity.kt AchshaliController/app/src/main/java/com/achshali/controller/
          cp achshali/app2-controller/PhoneActionReceiver.kt AchshaliController/app/src/main/java/com/achshali/controller/
          cp achshali/app2-controller/BootReceiver.kt AchshaliController/app/src/main/java/com/achshali/controller/
          cp achshali/app2-controller/AndroidManifest.xml AchshaliController/app/src/main/
          cp achshali/app2-controller/activity_controller.xml AchshaliController/app/src/main/res/layout/
          cp achshali/app2-controller/build.gradle AchshaliController/app/build.gradle

      - name: Create Controller Gradle files
        run: |
          cat > AchshaliController/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0'
              }
          }
          EOF
          cat > AchshaliController/settings.gradle << 'EOF'
          include ':app'
          EOF
          cat > AchshaliController/gradle.properties << 'EOF'
          android.useAndroidX=true
          EOF

      - name: Build Controller APK
        run: |
          cd AchshaliController
          gradle assembleDebug --no-daemon

      - name: Upload Brain APK
        uses: actions/upload-artifact@v3
        with:
          name: achshali-brain-apk
          path: AchshaliBrain/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Controller APK
        uses: actions/upload-artifact@v3
        with:
          name: achshali-controller-apk
          path: AchshaliController/app/build/outputs/apk/debug/app-debug.apk
