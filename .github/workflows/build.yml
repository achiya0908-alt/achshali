name: Build Achshali APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract ZIP
        run: unzip achshali-complete.zip

      - name: Install dependencies
        run: |
          sudo apt-get install -y python3-pil
          pip3 install Pillow --break-system-packages

      - name: Install Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q commandlinetools-linux-11076708_latest.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build Brain APK
        run: |
          mkdir -p AchshaliBrain/app/src/main/java/com/achshali/brain
          mkdir -p AchshaliBrain/app/src/main/res/layout
          mkdir -p AchshaliBrain/app/src/main/res/mipmap-hdpi
          mkdir -p AchshaliBrain/app/src/main/res/values
          mkdir -p AchshaliBrain/gradle/wrapper
          cp achshali/app1-brain/MainActivity.kt AchshaliBrain/app/src/main/java/com/achshali/brain/
          cp achshali/app1-brain/WakeWordService.kt AchshaliBrain/app/src/main/java/com/achshali/brain/
          cp achshali/app1-brain/BootReceiver.kt AchshaliBrain/app/src/main/java/com/achshali/brain/
          cp achshali/app1-brain/AndroidManifest.xml AchshaliBrain/app/src/main/
          cp achshali/app1-brain/activity_main.xml AchshaliBrain/app/src/main/res/layout/
          mkdir -p AchshaliBrain/app/src/main/res/drawable
          cat > AchshaliBrain/app/src/main/res/drawable/circle_button_bg.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#00E5FF"/>
              <size android:width="120dp" android:height="120dp"/>
          </shape>
          EOF
          cat > AchshaliBrain/app/src/main/res/drawable/pulse_bg.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#3300E5FF"/>
              <size android:width="150dp" android:height="150dp"/>
          </shape>
          EOF
          python3 -c "
          from PIL import Image
          img = Image.new('RGB', (108,108), (0,229,255))
          img.save('AchshaliBrain/app/src/main/res/mipmap-hdpi/ic_launcher.png')
          img.save('AchshaliBrain/app/src/main/res/mipmap-hdpi/ic_launcher_round.png')
          "
          cat > AchshaliBrain/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.Achshali" parent="Theme.MaterialComponents.DayNight.DarkActionBar"/>
          </resources>
          EOF
          cat > AchshaliBrain/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#00E5FF</color>
          </resources>
          EOF
          cat > AchshaliBrain/settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "AchshaliBrain"
          include ':app'
          EOF
          cat > AchshaliBrain/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.3.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          EOF
          cat > AchshaliBrain/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF
          cat > AchshaliBrain/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.achshali.brain'
              compileSdk 34
              defaultConfig {
                  applicationId "com.achshali.brain"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions { jvmTarget = '1.8' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
          }
          EOF
          cat > AchshaliBrain/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          EOF
          cd AchshaliBrain
          gradle wrapper --gradle-version 8.6
          ./gradlew assembleDebug --no-daemon --warning-mode=none

      - name: Build Controller APK
        run: |
          mkdir -p AchshaliController/app/src/main/java/com/achshali/controller
          mkdir -p AchshaliController/app/src/main/res/layout
          mkdir -p AchshaliController/app/src/main/res/mipmap-hdpi
          mkdir -p AchshaliController/app/src/main/res/values
          mkdir -p AchshaliController/gradle/wrapper
          cp achshali/app2-controller/MainActivity.kt AchshaliController/app/src/main/java/com/achshali/controller/
          cp achshali/app2-controller/PhoneActionReceiver.kt AchshaliController/app/src/main/java/com/achshali/controller/
          cp achshali/app2-controller/BootReceiver.kt AchshaliController/app/src/main/java/com/achshali/controller/
          cp achshali/app2-controller/AndroidManifest.xml AchshaliController/app/src/main/
          cp achshali/app2-controller/activity_controller.xml AchshaliController/app/src/main/res/layout/
          python3 -c "
          from PIL import Image
          img = Image.new('RGB', (108,108), (124,77,255))
          img.save('AchshaliController/app/src/main/res/mipmap-hdpi/ic_launcher.png')
          img.save('AchshaliController/app/src/main/res/mipmap-hdpi/ic_launcher_round.png')
          "
          cat > AchshaliController/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AchshaliController" parent="Theme.MaterialComponents.DayNight.DarkActionBar"/>
          </resources>
          EOF
          cat > AchshaliController/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#7C4DFF</color>
          </resources>
          EOF
          cat > AchshaliController/settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "AchshaliController"
          include ':app'
          EOF
          cat > AchshaliController/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.3.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          EOF
          cat > AchshaliController/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF
          cat > AchshaliController/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.achshali.controller'
              compileSdk 34
              defaultConfig {
                  applicationId "com.achshali.controller"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions { jvmTarget = '1.8' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF
          cat > AchshaliController/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          EOF
          cd AchshaliController
          gradle wrapper --gradle-version 8.6
          ./gradlew assembleDebug --no-daemon --warning-mode=none

      - name: Upload Brain APK
        uses: actions/upload-artifact@v4
        with:
          name: achshali-brain-apk
          path: AchshaliBrain/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Controller APK
        uses: actions/upload-artifact@v4
        with:
          name: achshali-controller-apk
          path: AchshaliController/app/build/outputs/apk/debug/app-debug.apk
